version: '3.9'

services:
  # Pipeline Orchestrator
  # Conecta ao PostgreSQL remoto em 10.0.68.39:5433
  # Processa áudios localmente
  # Salva transcricões no PostgreSQL remoto
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transcricao-pipeline
    environment:
      POSTGRES_URL: "postgres://srvbi:NbHo2WB8EyzatlPjmD1e@10.0.68.39:5433/transcriberdb"
      REMOTE_HOST: "20.127.212.253"
      REMOTE_USER: "speaksense"
      REMOTE_KEY: "/app/vm-speaksense-eus-dev_key.pem"
    volumes:
      - ./audios:/app/audios              # Áudios para processar
      - ./temp:/app/temp                  # Diretórios temp
      - ./transcricoes:/app/transcricoes  # Saídas
    restart: unless-stopped
    stdin_open: true
    tty: true
    network_mode: "host"
